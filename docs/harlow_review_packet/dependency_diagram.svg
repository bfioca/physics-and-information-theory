<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     width="8.5in" height="11in" viewBox="0 0 816 1056"
     role="img" aria-labelledby="title desc">
  <title id="title">Dependency map for a finite directional observer register</title>
  <desc id="desc">A status-labeled dependency chain from relational alignment risk to a proposed observer tradeoff, with separate Paper A realization support and Paper R fixed-background gravitational-witness branches.</desc>

  <defs>
    <style>
      .page { fill: #fbfcfd; }
      .header { fill: #14283d; }
      .card { fill: #ffffff; stroke: #cdd6df; stroke-width: 1.2; }
      .side-card { fill: #f4f7fa; stroke: #bfcbd6; stroke-width: 1.2; }
      .title { font: 700 25px "DejaVu Sans", sans-serif; fill: #ffffff; }
      .subtitle { font: 400 12.5px "DejaVu Sans", sans-serif; fill: #d9e5ef; }
      .section { font: 700 12.4px "DejaVu Sans", sans-serif; letter-spacing: 1.2px; fill: #556575; }
      .node-title { font: 700 15.5px "DejaVu Sans", sans-serif; fill: #172331; }
      .node-body { font: 400 12px "DejaVu Sans", sans-serif; fill: #485767; }
      .side-title { font: 700 13.3px "DejaVu Sans", sans-serif; fill: #172331; }
      .side-body { font: 400 10.6px "DejaVu Sans", sans-serif; fill: #485767; }
      .tiny { font: 400 9.4px sans-serif; fill: #5a6877; }
      .status { font: 700 9px sans-serif; letter-spacing: 0.45px; fill: #ffffff; }
      .status-dark { font: 700 9px sans-serif; letter-spacing: 0.35px; fill: #172331; }
      .proved { fill: #187767; }
      .conditional { fill: #ae6811; }
      .open { fill: #ae3d4d; }
      .proved-line { stroke: #187767; }
      .conditional-line { stroke: #ae6811; }
      .open-line { stroke: #ae3d4d; }
      .divider { stroke: #d7dee5; stroke-width: 1; }
      .arrow { fill: none; stroke-width: 1.8; marker-end: url(#arrowhead); }
      .branch { fill: none; stroke-width: 1.6; stroke-dasharray: 5 4; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" viewBox="0 0 10 10" refX="8.4" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#536474"/>
    </marker>
  </defs>

  <rect class="page" x="0" y="0" width="816" height="1056"/>

  <!-- Header -->
  <rect class="header" x="0" y="0" width="816" height="126"/>
  <text class="title" x="38" y="48">Finite directional records as an observer model</text>
  <text class="subtitle" x="38" y="74">Dependency map: rigorous ingredients, conditional bridges, and the theorem still to be built</text>
  <text class="subtitle" x="38" y="99">Task: infer the relative SO(3) alignment of two localized physical systems - never an absolute direction.</text>

  <!-- Legend -->
  <text class="section" x="38" y="158">STATUS</text>
  <rect class="proved" x="111" y="140" width="82" height="24" rx="12"/>
  <text class="status" x="152" y="156" text-anchor="middle">[PROVED]</text>
  <text class="tiny" x="201" y="156">theorem on a declared domain</text>
  <rect class="conditional" x="377" y="140" width="112" height="24" rx="12"/>
  <text class="status" x="433" y="156" text-anchor="middle">[CONDITIONAL]</text>
  <text class="tiny" x="497" y="156">model-dependent or floating evidence</text>
  <rect class="open" x="688" y="140" width="78" height="24" rx="12"/>
  <text class="status" x="727" y="156" text-anchor="middle">[OPEN]</text>

  <text class="section" x="38" y="194">OBSERVER-REGISTER CHAIN</text>
  <text class="section" x="596" y="194">REALIZATION SUPPORT</text>

  <!-- Main node 1 -->
  <rect class="card" x="36" y="210" width="474" height="66" rx="9"/>
  <rect class="proved" x="36" y="210" width="6" height="66" rx="3"/>
  <text class="node-title" x="54" y="236">Relational global-risk task</text>
  <text class="node-body" x="54" y="260">Haar-prior full-frame alignment of register O relative to target D.</text>
  <rect class="proved" x="414" y="223" width="80" height="22" rx="11"/>
  <text class="status" x="454" y="238" text-anchor="middle">[PROVED]</text>

  <!-- Arrow 1 -->
  <path class="arrow proved-line" d="M 273 276 L 273 314"/>
  <rect x="166" y="283" width="252" height="22" rx="11" fill="#fbfcfd" stroke="#187767" stroke-width="1"/>
  <text class="status-dark" x="292" y="298" text-anchor="middle">[PROVED] global information-risk theorem</text>

  <!-- Main node 2 -->
  <rect class="card" x="36" y="314" width="474" height="66" rx="9"/>
  <rect class="proved" x="36" y="314" width="6" height="66" rx="3"/>
  <text class="node-title" x="54" y="340">Required rotational asymmetry S_dir</text>
  <text class="node-body" x="54" y="364">Relative entropy of SO(3) asymmetry for the declared covariant task.</text>
  <rect class="proved" x="414" y="327" width="80" height="22" rx="11"/>
  <text class="status" x="454" y="342" text-anchor="middle">[PROVED]</text>

  <!-- Arrow 2 -->
  <path class="arrow proved-line" d="M 273 380 L 273 418"/>
  <rect x="158" y="387" width="268" height="22" rx="11" fill="#fbfcfd" stroke="#187767" stroke-width="1"/>
  <text class="status-dark" x="292" y="402" text-anchor="middle">[PROVED] sector and matter-capacity lemmas</text>

  <!-- Main node 3 -->
  <rect class="card" x="36" y="418" width="474" height="72" rx="9"/>
  <rect class="proved" x="36" y="418" width="6" height="72" rx="3"/>
  <text class="node-title" x="54" y="444">Representation and energy cost</text>
  <text class="node-body" x="54" y="467">Spin-sector Gibbs bounds and localization-energy bounds in named</text>
  <text class="node-body" x="54" y="481">orbital or supported-collective matter classes.</text>
  <rect class="proved" x="414" y="431" width="80" height="22" rx="11"/>
  <text class="status" x="454" y="446" text-anchor="middle">[PROVED]</text>

  <!-- Arrow 3 -->
  <path class="arrow conditional-line" d="M 273 490 L 273 528"/>
  <rect x="145" y="497" width="294" height="22" rx="11" fill="#fbfcfd" stroke="#ae6811" stroke-width="1"/>
  <text class="status-dark" x="292" y="512" text-anchor="middle">[CONDITIONAL] support and gravity dictionary</text>

  <!-- Main node 4 -->
  <rect class="card" x="36" y="528" width="474" height="72" rx="9"/>
  <rect class="conditional" x="36" y="528" width="6" height="72" rx="3"/>
  <text class="node-title" x="54" y="554">Localization and gravity budgets</text>
  <text class="node-body" x="54" y="577">Support and energy are controlled in named models; the invariant that</text>
  <text class="node-body" x="54" y="591">should cap observer capacity is not yet identified.</text>
  <rect class="conditional" x="382" y="541" width="112" height="22" rx="11"/>
  <text class="status" x="438" y="556" text-anchor="middle">[CONDITIONAL]</text>

  <!-- Branch connector from gravity budgets to Paper R -->
  <path class="branch conditional-line" d="M 510 575 L 596 575"/>
  <rect x="497" y="539" width="112" height="20" rx="10" fill="#fbfcfd" stroke="#ae6811" stroke-width="1"/>
  <text class="status-dark" x="553" y="553" text-anchor="middle">[CONDITIONAL]</text>
  <text class="tiny" x="553" y="568" text-anchor="middle">witness branch</text>

  <!-- Arrow 4 -->
  <path class="arrow open-line" d="M 273 600 L 273 638"/>
  <rect x="158" y="607" width="268" height="22" rx="11" fill="#fbfcfd" stroke="#ae3d4d" stroke-width="1"/>
  <text class="status-dark" x="292" y="622" text-anchor="middle">[OPEN] common-action record channel</text>

  <!-- Main node 5 -->
  <rect class="card" x="36" y="638" width="474" height="72" rx="9"/>
  <rect class="conditional" x="36" y="638" width="6" height="72" rx="3"/>
  <text class="node-title" x="54" y="664">Record lifetime and readout error</text>
  <text class="node-body" x="54" y="687">Exact degradation and readout implications exist for stipulated effective</text>
  <text class="node-body" x="54" y="701">channels; action-derived preparation, storage, and readout remain open.</text>
  <rect class="conditional" x="382" y="651" width="112" height="22" rx="11"/>
  <text class="status" x="438" y="666" text-anchor="middle">[CONDITIONAL]</text>

  <!-- Arrow 5 -->
  <path class="arrow open-line" d="M 273 710 L 273 748"/>
  <rect x="153" y="717" width="278" height="22" rx="11" fill="#fbfcfd" stroke="#ae3d4d" stroke-width="1"/>
  <text class="status-dark" x="292" y="732" text-anchor="middle">[OPEN] joint elimination and common window</text>

  <!-- Main node 6 -->
  <rect class="card" x="36" y="748" width="474" height="78" rx="9" stroke="#ae3d4d" stroke-width="1.6"/>
  <rect class="open" x="36" y="748" width="6" height="78" rx="3"/>
  <text class="node-title" x="54" y="775">Proposed localized-observer tradeoff</text>
  <text class="node-body" x="54" y="798">One action, one state family, and one semiclassical regime jointly control</text>
  <text class="node-body" x="54" y="812">risk, lifetime, support, energy, and gravitational backreaction.</text>
  <rect class="open" x="416" y="761" width="78" height="22" rx="11"/>
  <text class="status" x="455" y="776" text-anchor="middle">[OPEN]</text>

  <!-- Paper A support card -->
  <rect class="side-card" x="596" y="210" width="184" height="156" rx="9"/>
  <text class="side-title" x="610" y="234">Paper A: certified profile</text>
  <rect class="proved" x="686" y="244" width="80" height="20" rx="10"/>
  <text class="status" x="726" y="258" text-anchor="middle">[PROVED]</text>
  <line class="divider" x1="610" y1="276" x2="766" y2="276"/>
  <text class="side-body" x="610" y="296">Hard-wall, fixed-de Sitter:</text>
  <text class="side-body" x="610" y="312">existence, local uniqueness,</text>
  <text class="side-body" x="610" y="328">monotonicity, finite inertia.</text>
  <text class="tiny" x="610" y="350">Candidate register [CONDITIONAL]</text>
  <text class="tiny" x="610" y="362">Not rotating or self-gravitating.</text>

  <!-- Paper A to Paper R connector -->
  <path class="branch conditional-line" d="M 688 366 L 688 421"/>
  <rect x="600" y="377" width="176" height="22" rx="11" fill="#fbfcfd" stroke="#ae6811" stroke-width="1"/>
  <text class="status-dark" x="688" y="392" text-anchor="middle">[CONDITIONAL] candidate source</text>

  <!-- Paper R gravitational witness card -->
  <rect class="side-card" x="596" y="421" width="184" height="262" rx="9"/>
  <text class="side-title" x="610" y="445">Paper R: Weyl witness</text>
  <rect class="conditional" x="654" y="454" width="112" height="20" rx="10"/>
  <text class="status" x="710" y="468" text-anchor="middle">[CONDITIONAL]</text>
  <text class="side-body" x="610" y="492">Fixed-background response only.</text>
  <line class="divider" x1="610" y1="503" x2="766" y2="503"/>

  <rect class="proved" x="610" y="516" width="66" height="18" rx="9"/>
  <text class="status" x="643" y="529" text-anchor="middle">[PROVED]</text>
  <text class="side-body" x="610" y="550">Exact master, transmission,</text>
  <text class="side-body" x="610" y="564">and electric-Weyl maps.</text>

  <rect class="conditional" x="610" y="576" width="98" height="18" rx="9"/>
  <text class="status" x="659" y="589" text-anchor="middle">[CONDITIONAL]</text>
  <text class="side-body" x="610" y="610">Source-bound floating target</text>
  <text class="side-body" x="610" y="624">is stable and nonzero.</text>

  <rect class="open" x="610" y="637" width="62" height="18" rx="9"/>
  <text class="status" x="641" y="650" text-anchor="middle">[OPEN]</text>
  <text class="side-body" x="680" y="650">B_W zero exclusion</text>
  <text class="tiny" x="610" y="669">B_W is a candidate witness,</text>
  <text class="tiny" x="610" y="680">not a capacity bound.</text>

  <!-- Paper R to theorem connector -->
  <path class="branch open-line" d="M 780 642 L 796 642 L 796 793 L 510 793"/>
  <rect x="590" y="718" width="182" height="22" rx="11" fill="#fbfcfd" stroke="#ae3d4d" stroke-width="1"/>
  <text class="status-dark" x="681" y="733" text-anchor="middle">[OPEN] relevant gravity cap?</text>

  <!-- Caveat band -->
  <rect x="36" y="858" width="744" height="160" rx="10" fill="#eef3f6" stroke="#c5d0da" stroke-width="1.2"/>
  <text class="section" x="54" y="884">NON-NEGOTIABLE CLAIM BOUNDARIES</text>
  <line class="divider" x1="54" y1="895" x2="762" y2="895"/>
  <line class="divider" x1="408" y1="905" x2="408" y2="1001"/>

  <rect class="proved" x="54" y="910" width="66" height="18" rx="9"/>
  <text class="status" x="87" y="923" text-anchor="middle">[PROVED]</text>
  <text class="side-title" x="130" y="923">Relational, not absolute</text>
  <text class="side-body" x="54" y="943">The datum is alignment between two physical systems,</text>
  <text class="side-body" x="54" y="957">not orientation relative to coordinates.</text>

  <rect class="open" x="54" y="974" width="62" height="18" rx="9"/>
  <text class="status" x="85" y="987" text-anchor="middle">[OPEN]</text>
  <text class="side-title" x="126" y="987">S_dir != S_Ob</text>
  <text class="side-body" x="54" y="1005">No observer-entropy dictionary is proved.</text>

  <rect class="conditional" x="426" y="910" width="98" height="18" rx="9"/>
  <text class="status" x="475" y="923" text-anchor="middle">[CONDITIONAL]</text>
  <text class="side-title" x="534" y="923">Fixed background</text>
  <text class="side-body" x="426" y="943">B_W is a candidate witness, not the capacity bound</text>
  <text class="side-body" x="426" y="957">and not self-consistent gravity.</text>

  <rect class="open" x="426" y="974" width="62" height="18" rx="9"/>
  <text class="status" x="457" y="987" text-anchor="middle">[OPEN]</text>
  <text class="side-title" x="498" y="987">Common-action channel</text>
  <text class="side-body" x="426" y="1005">Preparation, storage, and readout are not yet derived together.</text>
</svg>
