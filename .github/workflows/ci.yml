name: static-patch-package

on:
  push:
    branches: [main]
  pull_request:

jobs:
  package-regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run packaged static-patch tests
        run: |
          PYTHONPATH=. python3 -m unittest \
            tests.test_static_patch_strong_continuity \
            tests.test_typeii_static_patch_limit \
            tests.test_inclusion_covariant_dynamics \
            tests.test_embedding_channels \
            tests.test_fuzzy_sphere \
            tests.test_fuzzy_screen \
            tests.test_fuzzy_algebra_inference \
            tests.test_fuzzy_berezin \
            tests.test_relational_observer \
            tests.test_edge_symmetry_robustness \
            tests.test_core_edge_obstruction \
            tests.test_interacting_kms_edge \
            tests.test_charged_reference_recovery \
            tests.test_operational_phase_reference \
            tests.test_su2_directional_reference_no_go \
            tests.test_operational_su2_reference \
            tests.test_geometric_thermal_type_no_go \
            tests.test_static_patch_weyl_regulator \
            tests.test_static_patch_phase_space \
            tests.test_static_patch_uv_removal \
            tests.test_static_patch_all_angular \
            tests.test_static_patch_lorentzian_hadamard \
            tests.test_scalar_clock_rotation_no_go \
            tests.test_redshifted_frame_capacity \
            tests.test_redshifted_rotation_reference_tradeoff \
            tests.test_covariant_observer_energy_no_go \
            tests.test_finite_size_static_patch_observer \
            tests.test_finite_time_rotation_diffusion \
            tests.test_common_mode_locality_mismatch \
            tests.test_static_patch_scalar_common_mode \
            tests.test_static_patch_radial_smearing \
            tests.test_static_patch_gradient_torque \
            tests.test_static_patch_higher_spin_gradient \
            tests.test_static_patch_pseudoscalar_gyroscope \
            tests.test_static_patch_hard_current_multipole \
            tests.test_static_patch_localization_backreaction \
            tests.test_static_patch_overlapping_ule \
            tests.test_static_patch_worldtube_ule \
            tests.test_static_patch_smooth_worldtube_ule \
            tests.test_static_patch_skyrmion_bath \
            tests.test_static_patch_skyrmion_signed_ule \
            tests.test_static_patch_skyrmion_tail \
            tests.test_static_patch_finite_switching_ule \
            tests.test_static_patch_skyrmion_offcenter \
            tests.test_validated_interval \
            tests.test_validated_skyrmion_origin \
            tests.test_validated_skyrmion_profile \
            tests.test_validated_skyrmion_bvp \
            tests.test_skyrmion_taylor_certificate_generator \
            tests.test_skyrmion_global_bvp_certificate_generator \
            tests.test_massive_skyrmion_profile \
            tests.test_massive_skyrmion_worldtube \
            tests.test_skyrmion_projective_reference \
            tests.test_skyrmion_joint_scaling_no_go \
            tests.test_skyrmion_current_moments \
            tests.test_skyrmion_worldtube_stability \
            tests.test_finite_clock_crossed_product \
            tests.test_modular_manybody_regulator \
            tests.test_continuum_lift_obstruction
      - name: Validate package indexes
        run: |
          python3 -m json.tool docs/static_patch_observer_algebra/audit_index.json >/dev/null
          python3 -m json.tool docs/goals24_31_static_patch_bridge_certificate_index.json >/dev/null
          python3 -m json.tool docs/major_goal_finite_to_typeii_static_patch_observer_algebra_certificate_index.json >/dev/null
          python3 -m json.tool docs/inclusion_covariant_static_patch_dynamics_certificate_index.json >/dev/null
          python3 -m json.tool docs/static_patch_embedding_channels_certificate_index.json >/dev/null
          python3 -m json.tool docs/continuum_lift_obstruction_certificate_index.json >/dev/null
      - name: Run compact reproduction script
        run: |
          PYTHONPATH=. python3 examples/reproduce_static_patch_package.py >/dev/null
