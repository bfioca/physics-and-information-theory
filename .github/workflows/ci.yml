name: final-support-paper

on:
  push:
    branches: [main]
  pull_request:

jobs:
  paper-regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install numerical replay dependency
        run: python -m pip install -e '.[research-numerics]'
      - name: Run focused test suite
        run: PYTHONPATH=. python -m pytest -q
      - name: Audit frozen manuscript package
        run: python paper/local_scalar_observer_cost/audit_package.py
      - name: Build deterministic review bundles
        run: >-
          python paper/local_scalar_observer_cost/build_review_packets.py
          --output-dir /tmp/local-scalar-observer-review
      - name: Replay analytic certificate outside the checkout
        run: >-
          PYTHONPATH=. python experiments/local_scalar_observer_cost_audit.py
          --output /tmp/local_scalar_observer_cost_certificate.json
      - name: Replay numerical spectrum outside the checkout
        run: |
          PYTHONPATH=. python experiments/local_scalar_observer_spectrum.py \
            --output-data /tmp/observer_cost_spectrum.json \
            --output-figure /tmp/observer_cost_spectrum.pdf \
            --output-preview /tmp/observer_cost_spectrum.svg
